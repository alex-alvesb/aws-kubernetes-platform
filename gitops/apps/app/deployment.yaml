apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-k8s-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aws-k8s-app
  template:
    metadata:
      labels:
        app: aws-k8s-app
    spec:

      imagePullSecrets:
        - name: ecr-secret

      containers:
        - name: aws-k8s-app
          image: .dkr.ecr.us-east-1.amazonaws.com/aws-k8s-app:6c307c0d94f70e1dcbc5a0b0bc5e3b85ba7f0a4d
          ports:
            - containerPort: 8000
          env:
            - name: APP_VERSION
              value: "v1"