apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-k8s-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aws-k8s-app
  template:
    metadata:
      labels:
        app: aws-k8s-app
    spec:
      containers:
        - name: aws-k8s-app
          image: 679346886253.dkr.ecr.us-east-1.amazonaws.com/aws-k8s-app:c79c8b69271367ca4e0ba34f6fa6002b55575cfd
          ports:
            - containerPort: 8000
          env:
            - name: APP_VERSION
              value: "v1"